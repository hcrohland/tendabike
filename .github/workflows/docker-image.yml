name: CI
permissions: 
  contents: read
  actions: read
  packages: write
  
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  
env:
  CARGO_TERM_COLOR: always

jobs:  
  docker:
    runs-on: ubuntu-latest

    env: 
      TAG: ${{ github.event_name == 'pull_request' && format('PR_{0}, ghcr.io/hcrohland/tendabike:staging', github.event.pull_request.number) || 'latest'}}
    steps:
    - 
      uses: actions/checkout@Latest
    -
      name: Set up Docker Buildx
      uses: docker/setup-buildx-action@latest
    - 
      name: Login to GitHub Container Registry
      uses: docker/login-action@latest
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    -
      name: Build and push
      uses: docker/build-push-action@latest
      with:
        push: true
        file: Dockerfile
        tags: ghcr.io/hcrohland/tendabike:${{ env.TAG }}
        context: .
      
